<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>boogerboys terminal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --panel: #021102;
      --panel-strong: #062006;
      --line: #134913;
      --text: #8dff8d;
      --text-dim: #59d859;
      --text-soft: #2f7d2f;
      --warn: #c8ffc8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      font-family: "Consolas", "Liberation Mono", "Courier New", monospace;
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(circle at top, rgba(18, 75, 18, 0.22), transparent 34%),
        linear-gradient(rgba(141, 255, 141, 0.045) 1px, transparent 1px);
      background-size: auto, 100% 4px;
      padding: 18px;
    }

    button,
    input {
      font: inherit;
    }

    .screen {
      width: min(100%, 1100px);
      margin: 0 auto;
      border: 1px solid var(--line);
      background: rgba(0, 8, 0, 0.96);
      box-shadow: 0 0 0 1px rgba(141, 255, 141, 0.08), 0 0 40px rgba(22, 80, 22, 0.24);
      min-height: calc(100vh - 36px);
      display: flex;
      flex-direction: column;
    }

    .titlebar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--text-dim);
      text-transform: lowercase;
      font-size: 0.95rem;
    }

    .content {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(280px, 340px);
    }

    .terminal-pane,
    .side-pane {
      padding: 16px;
    }

    .terminal-pane {
      min-height: 0;
    }

    .side-pane {
      border-left: 1px solid var(--line);
      background: rgba(2, 16, 2, 0.82);
    }

    .terminal-output {
      min-height: 52vh;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .line {
      margin: 0 0 8px;
      line-height: 1.55;
    }

    .prompt-row {
      display: flex;
      gap: 10px;
      align-items: center;
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }

    .prompt {
      color: var(--warn);
      white-space: nowrap;
    }

    #terminal-input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--line);
      background: #010601;
      color: var(--text);
      padding: 10px 12px;
    }

    #terminal-input:focus {
      outline: 1px solid var(--text-dim);
      border-color: var(--text-dim);
    }

    .panel,
    #jukebox {
      border: 1px solid var(--line);
      background: rgba(1, 15, 1, 0.72);
      padding: 14px;
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0 0 12px;
      color: var(--warn);
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .help-list,
    .simple-links {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .help-list li,
    .simple-links li {
      margin-bottom: 10px;
      line-height: 1.5;
      color: var(--text-dim);
    }

    .simple-links a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px dotted var(--text-soft);
    }

    .simple-links a:hover,
    .simple-links a:focus-visible {
      color: var(--warn);
      outline: none;
    }

    .jukebox-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--warn);
    }

    .song {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .song img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #000;
      image-rendering: pixelated;
    }

    #song-info {
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--text);
      padding: 10px 12px;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--text-dim);
      outline: none;
    }

    .volume-container {
      display: grid;
      gap: 8px;
      color: var(--text-dim);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--text);
    }

    .simple-only {
      display: none;
    }

    .simple-mode .simple-only {
      display: block;
    }

    .simple-mode .terminal-output {
      min-height: 30vh;
    }

    @media (max-width: 900px) {
      body {
        padding: 10px;
      }

      .screen {
        min-height: calc(100vh - 20px);
      }

      .content {
        grid-template-columns: 1fr;
      }

      .side-pane {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <audio id="bg-music"></audio>

  <main id="app" class="screen advanced-mode">
    <div class="titlebar">
      <span id="mode-label">mode: advanced</span>
      <span>bb terminal</span>
    </div>

    <div class="content">
      <section class="terminal-pane">
        <div id="terminal-output" class="terminal-output" aria-live="polite"></div>
        <div class="prompt-row">
          <span class="prompt">bb@site:~$</span>
          <input id="terminal-input" type="text" spellcheck="false" autocomplete="off" aria-label="Terminal input">
        </div>
      </section>

      <aside class="side-pane">
        <section class="panel simple-only">
          <h2>Simple Mode</h2>
          <ul class="simple-links">
            <li><a href="alex/WoahItsMyReallyCoolSiteThatYouShouldStayOnForAReallyReallyLongTimeFromJustHowAwesomeItIs.html">alex</a></li>
            <li><a href="temp/">hoodie</a></li>
            <li><a href="riley/reallycool.html">riley</a></li>
            <li><a href="temp/">valk</a></li>
            <li><a href="temp/">temp</a></li>
          </ul>
        </section>

        <section class="panel simple-only">
          <h2>Switch Back</h2>
          <ul class="help-list">
            <li>From a shell in the repo, run:</li>
            <li><code>sed -i 's/simple/advanced/g' site.txt</code></li>
          </ul>
        </section>

        <div id="jukebox" aria-label="Music player">
          <div class="jukebox-head">
            <span>jukebox.service</span>
            <span>online</span>
          </div>

          <div class="song">
            <img id="song-icon" src="Music1.png" alt="Current song art">
            <div id="song-info">ready. press prev or next to start audio.</div>
          </div>

          <div class="controls">
            <button type="button" id="prev-button">prev</button>
            <button type="button" id="next-button">next</button>
          </div>

          <label class="volume-container" for="volume">
            <span>volume</span>
            <input id="volume" type="range" min="0" max="1" step="0.01" value="0.85">
          </label>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const siteRoutes = {
      alex: "alex/WoahItsMyReallyCoolSiteThatYouShouldStayOnForAReallyReallyLongTimeFromJustHowAwesomeItIs.html",
      hoodie: "temp/",
      riley: "riley/reallycool.html",
      valk: "temp/",
      val: "temp/",
      temp: "temp/"
    };

    const songs = [
      { file: "Music1.mp3", credit: "Donkey Kong Country 2 - Stickerbush Symphony - Nintendo", icon: "Music1.png" },
      { file: "Music2.mp3", credit: "Lisa: The Pointless OST - Soft Hearts (World's Last Autumn Version)", icon: "Music2.png" },
      { file: "Music3.mp3", credit: "Deltarune Chapter 3 + 4 - 12 am - Toby Fox", icon: "Music3.png" }
    ];

    const app = document.getElementById("app");
    const modeLabel = document.getElementById("mode-label");
    const terminalOutput = document.getElementById("terminal-output");
    const terminalInput = document.getElementById("terminal-input");
    const audio = document.getElementById("bg-music");
    const songInfo = document.getElementById("song-info");
    const songIcon = document.getElementById("song-icon");
    const volumeSlider = document.getElementById("volume");
    const prevButton = document.getElementById("prev-button");
    const nextButton = document.getElementById("next-button");

    let currentSong = Math.floor(Math.random() * songs.length);
    let currentMode = "advanced";

    function printLine(text) {
      const line = document.createElement("p");
      line.className = "line";
      line.textContent = text;
      terminalOutput.appendChild(line);
      terminalOutput.scrollTop = terminalOutput.scrollHeight;
    }

    function printPrompt(command) {
      printLine("bb@site:~$ " + command);
    }

    function updateSongDisplay(index, messageOverride) {
      songIcon.src = songs[index].icon;
      songInfo.textContent = messageOverride || songs[index].credit;
    }

    function playSong(index) {
      currentSong = index;
      audio.src = songs[index].file;
      audio.volume = parseFloat(volumeSlider.value);
      updateSongDisplay(index, "loading " + songs[index].credit);
      audio.play().then(() => {
        updateSongDisplay(index);
      }).catch(() => {
        updateSongDisplay(index, "audio locked. press prev or next to authorize playback.");
      });
    }

    function nextSong() {
      playSong((currentSong + 1) % songs.length);
    }

    function prevSong() {
      playSong((currentSong - 1 + songs.length) % songs.length);
    }

    function showAdvancedIntro() {
      terminalOutput.innerHTML = "";
      printLine("welcome to boogerboys advanced mode.");
      printLine("type help for commands.");
      printLine("available sites: alex hoodie riley valk temp");
      printLine("to switch this page to simple mode from bash:");
      printLine("sed -i 's/advanced/simple/g' site.txt");
    }

    function showSimpleIntro() {
      terminalOutput.innerHTML = "";
      printLine("simple mode enabled.");
      printLine("use the links on the right or type cd <site> here.");
      printLine("to switch back from bash:");
      printLine("sed -i 's/simple/advanced/g' site.txt");
    }

    function setMode(mode) {
      currentMode = mode === "simple" ? "simple" : "advanced";
      app.className = "screen " + currentMode + "-mode";
      modeLabel.textContent = "mode: " + currentMode;

      if (currentMode === "simple") {
        showSimpleIntro();
      } else {
        showAdvancedIntro();
      }
    }

    function navigateToSite(name) {
      const route = siteRoutes[name];
      if (!route) {
        printLine("cd: no such site: " + name);
        return;
      }

      printLine("navigating to " + name + "...");
      window.location.href = route;
    }

    function runCommand(rawValue) {
      const value = rawValue.trim();
      if (!value) {
        return;
      }

      printPrompt(value);
      const normalized = value.toLowerCase();
      const parts = normalized.split(/\s+/);
      const command = parts[0];
      const arg = parts[1];

      if (normalized === "help") {
        printLine("commands: help, ls, pwd, clear, cat site.txt, cd <alex|hoodie|riley|valk|temp>");
        return;
      }

      if (normalized === "ls") {
        printLine("alex  hoodie  riley  valk  temp");
        return;
      }

      if (normalized === "pwd") {
        printLine("/home/bb");
        return;
      }

      if (normalized === "clear") {
        if (currentMode === "simple") {
          showSimpleIntro();
        } else {
          showAdvancedIntro();
        }
        return;
      }

      if (normalized === "cat site.txt") {
        printLine(currentMode);
        return;
      }

      if (command === "cd") {
        if (!arg) {
          printLine("cd: missing site name");
          return;
        }
        navigateToSite(arg);
        return;
      }

      printLine("command not found: " + value);
    }

    terminalInput.addEventListener("keydown", event => {
      if (event.key !== "Enter") {
        return;
      }

      runCommand(terminalInput.value);
      terminalInput.value = "";
    });

    prevButton.addEventListener("click", prevSong);
    nextButton.addEventListener("click", nextSong);
    audio.addEventListener("ended", nextSong);
    volumeSlider.addEventListener("input", () => {
      audio.volume = parseFloat(volumeSlider.value);
    });

    fetch("site.txt", { cache: "no-store" })
      .then(response => response.ok ? response.text() : "advanced")
      .then(text => {
        const mode = text.trim().toLowerCase();
        setMode(mode === "simple" ? "simple" : "advanced");
      })
      .catch(() => {
        setMode("advanced");
      })
      .finally(() => {
        terminalInput.focus();
        updateSongDisplay(currentSong, "ready. press prev or next to start audio.");
      });
  </script>
</body>
</html>
