<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>boogerboys terminal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --panel: #021102;
      --panel-strong: #062006;
      --line: #134913;
      --text: #8dff8d;
      --text-dim: #59d859;
      --text-soft: #2f7d2f;
      --warn: #c8ffc8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      font-family: "Consolas", "Liberation Mono", "Courier New", monospace;
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(circle at top, rgba(18, 75, 18, 0.22), transparent 34%),
        linear-gradient(rgba(141, 255, 141, 0.045) 1px, transparent 1px);
      background-size: auto, 100% 4px;
      padding: 18px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.18) 3px,
        rgba(0, 0, 0, 0.18) 4px
      );
      opacity: 0.55;
      mix-blend-mode: multiply;
    }

    button,
    input {
      font: inherit;
    }

    .screen {
      width: min(100%, 1100px);
      margin: 0 auto;
      border: 1px solid var(--line);
      background: rgba(0, 8, 0, 0.96);
      box-shadow: 0 0 0 1px rgba(141, 255, 141, 0.08), 0 0 40px rgba(22, 80, 22, 0.24);
      min-height: calc(100vh - 36px);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(rgba(200, 255, 200, 0.03), rgba(0, 0, 0, 0.02));
    }

    .titlebar {
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--text-dim);
      text-transform: lowercase;
      font-size: 0.95rem;
      position: relative;
      z-index: 1;
    }

    .content {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(280px, 340px);
      position: relative;
      z-index: 1;
    }

    .terminal-pane,
    .side-pane {
      padding: 16px;
    }

    .terminal-pane {
      min-height: 0;
    }

    .side-pane {
      border-left: 1px solid var(--line);
      background: rgba(2, 16, 2, 0.82);
    }

    .terminal-output {
      min-height: 52vh;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .line {
      margin: 0 0 8px;
      line-height: 1.55;
    }

    .prompt-row {
      display: flex;
      gap: 10px;
      align-items: center;
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }

    .prompt {
      color: var(--warn);
      white-space: nowrap;
    }

    #terminal-input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--line);
      background: #010601;
      color: var(--text);
      padding: 10px 12px;
      caret-color: transparent;
    }

    #terminal-input:focus {
      outline: 1px solid var(--text-dim);
      border-color: var(--text-dim);
    }

    .panel,
    #jukebox {
      border: 1px solid var(--line);
      background: rgba(1, 15, 1, 0.72);
      padding: 14px;
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0 0 12px;
      color: var(--warn);
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .help-list,
    .simple-links {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .help-list li,
    .simple-links li {
      margin-bottom: 10px;
      line-height: 1.5;
      color: var(--text-dim);
    }

    .simple-links a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px dotted var(--text-soft);
    }

    .simple-links a:hover,
    .simple-links a:focus-visible {
      color: var(--warn);
      outline: none;
    }

    .jukebox-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--warn);
    }

    .song {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .song img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #000;
      image-rendering: pixelated;
    }

    #song-info {
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--text);
      padding: 10px 12px;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--text-dim);
      outline: none;
    }

    .volume-container {
      display: grid;
      gap: 8px;
      color: var(--text-dim);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--text);
    }

    .simple-only {
      display: none;
    }

    .simple-mode .simple-only {
      display: block;
    }

    .simple-mode .terminal-output {
      min-height: 30vh;
    }

    @media (max-width: 900px) {
      body {
        padding: 10px;
      }

      .screen {
        min-height: calc(100vh - 20px);
      }

      .content {
        grid-template-columns: 1fr;
      }

      .side-pane {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <audio id="bg-music"></audio>

  <main id="app" class="screen advanced-mode">
    <div class="titlebar">
      <span>bb terminal</span>
    </div>

    <div class="content">
      <section class="terminal-pane">
        <div id="terminal-output" class="terminal-output" aria-live="polite"></div>
        <div class="prompt-row">
          <span class="prompt">guest@boogerboys:~/temp$</span>
          <input id="terminal-input" type="text" spellcheck="false" autocomplete="off" aria-label="Terminal input">
        </div>
      </section>

      <aside class="side-pane">
        <section class="panel simple-only">
          <h2>Sites</h2>
          <ul class="simple-links">
            <li><a href="alex/WoahItsMyReallyCoolSiteThatYouShouldStayOnForAReallyReallyLongTimeFromJustHowAwesomeItIs.html">alex</a></li>
            <li><a href="temp/index.html">hoodie</a></li>
            <li><a href="riley/reallycool.html">riley</a></li>
            <li><a href="temp/index.html">valk</a></li>
            <li><a href="temp/index.html">temp</a></li>
          </ul>
        </section>

        <section class="panel simple-only">
          <h2>Toggle</h2>
          <ul class="help-list">
            <li><code>sed -i 's/simple/advanced/g' site.txt</code></li>
          </ul>
        </section>

        <div id="jukebox" aria-label="Music player">
          <div class="jukebox-head">
            <span>jukebox.service</span>
            <span>online</span>
          </div>

          <div class="song">
            <img id="song-icon" src="Music1.png" alt="Current song art">
            <div id="song-info">ready. press prev or next to start audio.</div>
          </div>

          <div class="controls">
            <button type="button" id="prev-button">prev</button>
            <button type="button" id="next-button">next</button>
          </div>

          <label class="volume-container" for="volume">
            <span>volume</span>
            <input id="volume" type="range" min="0" max="1" step="0.01" value="0.85">
          </label>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const promptText = "guest@boogerboys:~/temp$";
    const modeKey = "boogerboys-site-mode";
    const sedToSimple = "sed -i 's/advanced/simple/g' site.txt";
    const sedToAdvanced = "sed -i 's/simple/advanced/g' site.txt";
    const typingDelayMs = 100;
    const bootTime = Date.now();
    const siteRoutes = {
      alex: "alex/WoahItsMyReallyCoolSiteThatYouShouldStayOnForAReallyReallyLongTimeFromJustHowAwesomeItIs.html",
      hoodie: "temp/index.html",
      riley: "riley/reallycool.html",
      valk: "temp/index.html",
      val: "temp/index.html",
      temp: "temp/index.html"
    };

    const fileSystem = {
      "/etc/motd": [
        "welcome to boogerboys.",
        "bbOS 0.3 unstable",
        "watch your step."
      ],
      "/etc/services": [
        "jukebox.service online",
        "router.service degraded",
        "guestbook.socket idle"
      ],
      "/log/visitors": [
        "alex: left the lights on",
        "riley: pushed at 03:12",
        "hoodie: no deployment yet",
        "valk: route forwarded to temp"
      ],
      "/dev/notes": [
        "disk activity: nominal",
        "latency source: fake by design",
        "mood: green"
      ],
      "/home/bb/feedback": [
        "alex: site looks haunted in a good way",
        "riley: terminal approved",
        "hoodie: temp still temp",
        "valk: send build when ready"
      ]
    };

    const songs = [
      { file: "Music1.mp3", credit: "Donkey Kong Country 2 - Stickerbush Symphony - Nintendo", icon: "Music1.png" },
      { file: "Music2.mp3", credit: "Lisa: The Pointless OST - Soft Hearts (World's Last Autumn Version)", icon: "Music2.png" },
      { file: "Music3.mp3", credit: "Deltarune Chapter 3 + 4 - 12 am - Toby Fox", icon: "Music3.png" }
    ];

    const app = document.getElementById("app");
    const terminalOutput = document.getElementById("terminal-output");
    const terminalInput = document.getElementById("terminal-input");
    const audio = document.getElementById("bg-music");
    const songInfo = document.getElementById("song-info");
    const songIcon = document.getElementById("song-icon");
    const volumeSlider = document.getElementById("volume");
    const prevButton = document.getElementById("prev-button");
    const nextButton = document.getElementById("next-button");

    let currentSong = Math.floor(Math.random() * songs.length);
    let currentMode = "advanced";
    let displayValue = "";
    let desiredValue = "";
    let inputTimer = null;

    function formatUptime() {
      const elapsed = Math.floor((Date.now() - bootTime) / 1000);
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;
      return minutes + "m " + seconds + "s";
    }

    function printLine(text) {
      const line = document.createElement("p");
      line.className = "line";
      line.textContent = text;
      terminalOutput.appendChild(line);
      terminalOutput.scrollTop = terminalOutput.scrollHeight;
    }

    function printLines(lines) {
      lines.forEach(printLine);
    }

    function printPrompt(command) {
      printLine(promptText + " " + command);
    }

    function updateSongDisplay(index, messageOverride) {
      songIcon.src = songs[index].icon;
      songInfo.textContent = messageOverride || songs[index].credit;
    }

    function playSong(index) {
      currentSong = index;
      audio.src = songs[index].file;
      audio.volume = parseFloat(volumeSlider.value);
      updateSongDisplay(index, "loading " + songs[index].credit);
      audio.play().then(() => {
        updateSongDisplay(index);
      }).catch(() => {
        updateSongDisplay(index, "audio locked. press prev or next to authorize playback.");
      });
    }

    function nextSong() {
      playSong((currentSong + 1) % songs.length);
    }

    function prevSong() {
      playSong((currentSong - 1 + songs.length) % songs.length);
    }

    function showDefaultIntro() {
      terminalOutput.innerHTML = "";
      printLine("welcome to boogerboys.");
      printLine("type help for commands.");
      printLine("site switch: " + sedToSimple);
    }

    function showSimpleIntro() {
      terminalOutput.innerHTML = "";
      printLine("welcome to boogerboys.");
      printLine("type cd <site> or use the links on the right.");
      printLine("site switch: " + sedToAdvanced);
    }

    function persistMode(mode) {
      try {
        localStorage.setItem(modeKey, mode);
      } catch (error) {
      }
    }

    function setMode(mode) {
      currentMode = mode === "simple" ? "simple" : "advanced";
      app.className = "screen " + currentMode + "-mode";
      persistMode(currentMode);

      if (currentMode === "simple") {
        showSimpleIntro();
      } else {
        showDefaultIntro();
      }
    }

    function navigateToSite(name) {
      const route = siteRoutes[name];
      if (!route) {
        printLine("cd: no such site: " + name);
        return;
      }

      printLine("cd " + name);
      window.location.href = route;
    }

    function syncInputToDesired() {
      if (displayValue === desiredValue) {
        inputTimer = null;
        return;
      }

      if (displayValue.length < desiredValue.length) {
        displayValue = desiredValue.slice(0, displayValue.length + 1);
      } else {
        displayValue = displayValue.slice(0, -1);
      }

      terminalInput.value = displayValue;
      terminalInput.setSelectionRange(displayValue.length, displayValue.length);
      inputTimer = window.setTimeout(syncInputToDesired, typingDelayMs);
    }

    function queueInputSync() {
      if (inputTimer !== null) {
        return;
      }
      inputTimer = window.setTimeout(syncInputToDesired, typingDelayMs);
    }

    function setDesiredValue(nextValue) {
      desiredValue = nextValue;
      queueInputSync();
    }

    function handleCat(target) {
      if (!target) {
        printLine("cat: missing file operand");
        return;
      }

      if (target === "site.txt") {
        printLine(currentMode);
        return;
      }

      if (fileSystem[target]) {
        printLines(fileSystem[target]);
        return;
      }

      printLine("cat: " + target + ": No such file or directory");
    }

    function runCommand(rawValue) {
      const value = rawValue.trim();
      if (!value) {
        return;
      }

      printPrompt(value);
      const normalized = value.toLowerCase();
      const parts = normalized.split(/\s+/);
      const command = parts[0];
      const arg = parts[1];

      if (normalized === sedToSimple) {
        setMode("simple");
        printLine("site.txt updated");
        return;
      }

      if (normalized === sedToAdvanced) {
        setMode("advanced");
        printLine("site.txt updated");
        return;
      }

      if (normalized === "help") {
        printLines([
          "help",
          "ls",
          "pwd",
          "clear",
          "whoami",
          "systeminfo",
          "uptime",
          "cat site.txt",
          "cat /etc/motd",
          "cat /etc/services",
          "cat /log/visitors",
          "cat /dev/notes",
          "cat /home/bb/feedback",
          sedToSimple,
          sedToAdvanced,
          "cd alex",
          "cd hoodie",
          "cd riley",
          "cd valk",
          "cd temp"
        ]);
        return;
      }

      if (normalized === "ls") {
        printLine("alex  hoodie  riley  valk  temp  etc  log  dev");
        return;
      }

      if (normalized === "pwd") {
        printLine("/home/bb");
        return;
      }

      if (normalized === "whoami") {
        printLine("guest");
        return;
      }

      if (normalized === "uptime") {
        printLine(formatUptime());
        return;
      }

      if (normalized === "systeminfo") {
        printLines([
          "user: guest",
          "host: boogerboys",
          "os: bbOS 0.3 unstable",
          "uptime: " + formatUptime(),
          "services: jukebox.service (online)"
        ]);
        return;
      }

      if (normalized === "clear") {
        if (currentMode === "simple") {
          showSimpleIntro();
        } else {
          showDefaultIntro();
        }
        return;
      }

      if (command === "cat") {
        handleCat(value.slice(4).trim());
        return;
      }

      if (command === "cd") {
        if (!arg) {
          printLine("cd: missing site name");
          return;
        }
        navigateToSite(arg);
        return;
      }

      printLine("command not found: " + value);
    }

    terminalInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        const submittedValue = desiredValue;
        displayValue = "";
        desiredValue = "";
        if (inputTimer !== null) {
          window.clearTimeout(inputTimer);
          inputTimer = null;
        }
        terminalInput.value = "";
        runCommand(submittedValue);
        return;
      }

      if (event.key === "Backspace") {
        event.preventDefault();
        setDesiredValue(desiredValue.slice(0, -1));
        return;
      }

      if (event.key === "Tab") {
        event.preventDefault();
        return;
      }

      if (event.key.length === 1 && !event.ctrlKey && !event.metaKey && !event.altKey) {
        event.preventDefault();
        setDesiredValue(desiredValue + event.key);
      }
    });

    terminalInput.addEventListener("paste", event => {
      event.preventDefault();
      const pasted = (event.clipboardData || window.clipboardData).getData("text");
      setDesiredValue(desiredValue + pasted);
    });

    prevButton.addEventListener("click", prevSong);
    nextButton.addEventListener("click", nextSong);
    audio.addEventListener("ended", nextSong);
    volumeSlider.addEventListener("input", () => {
      audio.volume = parseFloat(volumeSlider.value);
    });

    let mode = "advanced";
    try {
      const savedMode = localStorage.getItem(modeKey);
      if (savedMode === "simple" || savedMode === "advanced") {
        mode = savedMode;
      }
    } catch (error) {
    }

    setMode(mode);
    terminalInput.focus();
    updateSongDisplay(currentSong, "ready. press prev or next to start audio.");
  </script>
</body>
</html>
